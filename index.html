<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <link rel="stylesheet" href="stylesheet/login_style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <title>Welcome</title>
</head>
<body>


    <div class="container">
      <!-- image on the login box -->
      <div class="img-cover">

      </div>
      <!-- end of image -->

      <!-- login form -->
      <form class="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" aria-describedby="emailHelp">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password">
          </div>
          <button type="submit" class="btn btn-primary" id="login">login</button>
          <a href="#" class="btn btn-primary" id="register">Register</a>
        </form>
      <!-- end of login form -->
      
      <!-- alert when invalid credential -->
      <div class="modal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Invalid</h5>
              <button type="button" class="close exit" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body">
              <p></p>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary exit" data-dismiss="modal">Tutup</button>
            </div>
          </div>
        </div>
      </div>
      <!-- end of alert -->

      <!-- registration form -->

      <form class="registration-form" style="display: none;">
        <div class="form-group">
          <label for="username-register">Username</label>
          <input type="text" class="form-control" id="username-register" aria-describedby="emailHelp">
        </div>
        <div class="form-group">
          <label for="password-register">Password</label>
          <input type="password" class="form-control" id="password-register">
        </div>
        <div class="form-group">
          <label for="nickname">Nickname</label>
          <input type="text" class="form-control" id="nickname-register">
        </div>
        <button type="submit" class="btn btn-primary" id="add">Register</button>
        <small><a href="#" id="back-link">back to login</a></small>
      </form>

      <!-- end of registration form -->

    </div>

    <script src="script/index.js"></script>
</body>
</html>
